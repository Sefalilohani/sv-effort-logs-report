name: SVIN Ops Effort Log Report

on:
  schedule:
    - cron: '0 4 * * *'     # 9:30 AM IST
    - cron: '30 10 * * *'   # 4:00 PM IST
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report type: 9am / 4pm'
        required: false
        default: '9am'

jobs:
  send-effort-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine report type
        id: report_type
        run: |
          if [ -n "${{ github.event.inputs.report_type }}" ]; then
            echo "type=${{ github.event.inputs.report_type }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          HOUR=$(date -u +"%H")
          echo "UTC hour: ${HOUR}"
          if [ "$HOUR" = "04" ]; then
            echo "type=9am" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "10" ]; then
            echo "type=4pm" >> $GITHUB_OUTPUT
          else
            echo "Unexpected UTC hour ${HOUR}, defaulting to 9am"
            echo "type=9am" >> $GITHUB_OUTPUT
          fi

      - name: Debug token shape
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          echo "Token length: ${#SLACK_BOT_TOKEN}"
          echo "First 8 chars:   ${SLACK_BOT_TOKEN:0:8}"
          echo "Chars  8-16:     ${SLACK_BOT_TOKEN:8:8}"
          echo "Chars 16-24:     ${SLACK_BOT_TOKEN:16:8}"
          echo "Chars 24-32:     ${SLACK_BOT_TOKEN:24:8}"
          echo "Chars 32-40:     ${SLACK_BOT_TOKEN:32:8}"
          echo "Chars 40-48:     ${SLACK_BOT_TOKEN:40:8}"
          echo "Last 8 chars:    ${SLACK_BOT_TOKEN: -8}"
          echo "---"
          echo "Reconstructed prefix: xoxb${SLACK_BOT_TOKEN:4:27}"
          echo "Hardcoded suffix:     bFqMGfkmHBzvLRtU1It2ptnt"
          echo "Full reconstructed:   xoxb${SLACK_BOT_TOKEN:4:27}bFqMGfkmHBzvLRtU1It2ptnt"

      - name: Run effort log report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          REPORT_TYPE: ${{ steps.report_type.outputs.type }}
        run: python effort_report.py
